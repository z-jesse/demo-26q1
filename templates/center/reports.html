<style>
  .rpt-md { font-size: 14px; color: rgba(210,210,210,1); line-height: 1.7; }
  .rpt-md > *:first-child { margin-top: 0; }
  .rpt-md > *:last-child  { margin-bottom: 0; }
  .rpt-md p { margin: 0 0 12px 0; }
  .rpt-md strong { color: #fff; font-weight: 600; }
  .rpt-md em { font-style: italic; }
  .rpt-md ol, .rpt-md ul { margin: 0 0 12px 0; padding-left: 24px; }
  .rpt-md ol { list-style: decimal outside; }
  .rpt-md ul { list-style: disc outside; }
  .rpt-md li { margin: 0 0 6px 0; padding-left: 4px; }
  .rpt-md li::marker { color: rgba(122,122,122,1); }
  .rpt-md h1, .rpt-md h2, .rpt-md h3, .rpt-md h4 {
    color: #fff; font-weight: 600; margin: 16px 0 8px 0;
  }
  .rpt-md h1 { font-size: 18px; }
  .rpt-md h2 { font-size: 16px; }
  .rpt-md h3, .rpt-md h4 { font-size: 14px; }
  .rpt-md code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12.5px; background: rgba(61,61,61,0.6);
    padding: 1px 6px; border-radius: 4px;
  }
  .rpt-md pre {
    background: rgba(41,40,39,1); border: 1px solid rgba(61,61,61,1);
    border-radius: 8px; padding: 12px; overflow-x: auto; margin: 0 0 12px 0;
  }
  .rpt-md pre code { background: transparent; padding: 0; }
  .rpt-md a { color: rgba(204,195,149,1); text-decoration: underline; }
  .rpt-md blockquote {
    border-left: 3px solid rgba(61,61,61,1); padding-left: 12px;
    color: rgba(180,180,180,1); margin: 0 0 12px 0;
  }
  
  /* ── Skeleton Loading ── */
  @keyframes rptPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 0.3; }
  }
  .rpt-skeleton {
    animation: rptPulse 1.6s ease-in-out infinite;
  }
  .rpt-skeleton-container {
    background: rgba(255, 255, 255, 0.015);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .rpt-skeleton-header {
    height: 16px;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 4px;
    margin-bottom: 16px;
  }
  .rpt-skeleton-line {
    height: 11px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 4px;
    margin-bottom: 10px;
  }
  .rpt-skeleton-line:last-child {
    margin-bottom: 0;
  }
  .rpt-skeleton-chart {
    height: 200px;
    background: rgba(255, 255, 255, 0.025);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .rpt-skeleton-table-row {
    display: flex;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    padding: 12px 0;
    align-items: center;
  }
  .rpt-skeleton-table-row:last-child {
    border-bottom: none;
  }
  .rpt-skeleton-table-cell {
    height: 11px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 4px;
    margin-right: 16px;
  }
  .rpt-skeleton-table-cell:last-child {
    margin-right: 0;
  }

  /* Format Selection Cards */
  .rpt-format-card-input {
    display: none;
  }
  .rpt-format-card {
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(255, 255, 255, 0.02);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s ease-in-out;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .rpt-format-card:hover {
    border-color: rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.04);
  }
  .rpt-format-card-input:checked + .rpt-format-card {
    border-color: var(--colors-primary-default);
    background: rgba(108, 92, 231, 0.15);
    box-shadow: 0 0 12px rgba(108, 92, 231, 0.2);
  }
  .rpt-format-title {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }
  .rpt-format-desc {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
    line-height: 1.4;
  }

  /* ── Save Changes: dirty state (unsaved SQL draft) ── */
  .rpt-save-dirty {
    background: rgba(204,195,149,0.15) !important;
    border-color: rgba(204,195,149,0.6) !important;
    color: rgba(204,195,149,1) !important;
  }
  .rpt-save-dirty:hover {
    background: rgba(204,195,149,0.25) !important;
    border-color: rgba(204,195,149,0.8) !important;
  }
</style>
<div class="classes-view" data-colors-mode="dark">

  <!-- ── Panel: List ─────────────────────────────────────────── -->
  <div id="rpt-panel-list" class="classes-view">
    <header class="panel-header">
      <h2 class="panel-title">Reports</h2>
      <button type="button" class="panel-btn" onclick="rptShowNew()">+ New Report</button>
    </header>

    <div class="classes-view__card">
      <table class="data-table">
        <thead>
          <tr>
            <th class="data-table__th">Report Name</th>
            <th class="data-table__th">Date Range</th>
            <th class="data-table__th">Last Run</th>
            <th class="data-table__th data-table__th--actions" aria-label="Actions"></th>
          </tr>
        </thead>
        <tbody id="rpt-tbody">
          <tr><td colspan="4" class="data-table__cell" style="text-align:center;color:rgba(122,122,122,1)">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── Panel: Detail / Edit ───────────────────────────────── -->
  <div id="rpt-panel-detail" class="classes-view" style="display:none">
    <header class="panel-header">
      <button type="button" class="panel-btn" style="margin-right:auto;margin-left:0" onclick="rptShowList()">← Back</button>
      <h2 class="panel-title" id="rpt-detail-title"></h2>
      <button type="button" class="panel-btn" style="color:#e05252" onclick="rptDelete()">Delete</button>
    </header>

    <div style="display:flex;gap:0;flex:1;min-height:0;overflow:hidden;border-radius:var(--MVP-v1-1-container-radius-l);border:1px solid var(--colors-border-moderate)">

      <!-- Main content area -->
      <div style="flex:1;min-width:0;overflow-y:auto;padding:24px 28px;scrollbar-color:rgba(255,255,255,0.25) transparent;scrollbar-width:thin">
        <div id="rpt-content-area" class="max-w-4xl mx-auto w-full">
          <div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">No report generated yet. Click "Regenerate Report" to generate.</div>
        </div>
      </div>

      <!-- Right settings panel -->
      <div style="width:300px;min-width:300px;border-left:1px solid rgba(61,61,61,1);display:flex;flex-direction:column;overflow-y:auto;scrollbar-color:rgba(255,255,255,0.25) transparent;scrollbar-width:thin">

        <!-- Settings header -->
        <div style="padding:16px 20px 12px;border-bottom:1px solid rgba(61,61,61,1)">
          <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(122,122,122,1)">Report Settings</div>
        </div>

        <div style="padding:20px;display:flex;flex-direction:column;gap:20px;flex:1">

          <!-- Report Name -->
          <div style="display:flex;flex-direction:column;gap:6px">
            <label style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(122,122,122,1)">Report Name</label>
            <input id="rpt-sp-name" type="text"
              style="background:rgba(41,40,39,1);border:1px solid rgba(61,61,61,1);border-radius:8px;color:#fff;font-family:Figtree;font-size:14px;padding:8px 12px;width:100%;outline:none;transition:border-color .2s"
              onfocus="this.style.borderColor='rgba(204,195,149,0.6)'" onblur="this.style.borderColor='rgba(61,61,61,1)'" />
          </div>

          <!-- Report Type -->
          <div style="display:flex;flex-direction:column;gap:6px">
            <label style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(122,122,122,1)">Report Type</label>
            <div id="rpt-sp-type-badge" style="display:inline-flex;align-items:center;padding:6px 12px;border-radius:8px;font-family:Figtree;font-size:13px;font-weight:600;letter-spacing:.02em;width:fit-content;user-select:none">
              <span id="rpt-sp-type-text">—</span>
            </div>
          </div>

          <!-- Date Range -->
          <div style="display:flex;flex-direction:column;gap:6px">
            <label style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(122,122,122,1)">Date Range</label>
            <div style="position:relative">
              <select id="rpt-sp-range"
                style="background:rgba(41,40,39,1);border:1px solid rgba(61,61,61,1);border-radius:8px;color:#fff;font-family:Figtree;font-size:14px;padding:8px 12px;width:100%;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none"
                onfocus="this.style.borderColor='rgba(204,195,149,0.6)'" onblur="this.style.borderColor='rgba(61,61,61,1)'"
                onchange="rptOnDateRangeChange()">
                <option value="last_7_days" style="background:#1a1a1a">Last 7 days</option>
                <option value="last_30_days" style="background:#1a1a1a">Last 30 days</option>
                <option value="last_90_days" style="background:#1a1a1a">Last 90 days</option>
                <option value="this_month" style="background:#1a1a1a">This Month</option>
                <option value="last_month" style="background:#1a1a1a">Last Month</option>
                <option value="this_year" style="background:#1a1a1a">This Year</option>
                <option value="all_time" style="background:#1a1a1a">All Time</option>
              </select>
              <div style="position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;display:flex;align-items:center">
                <img src="/static/img/chevron-down-small.svg" style="width:12px;height:12px" alt="" />
              </div>
            </div>
          </div>

          <!-- Custom Prompt -->
          <div style="display:flex;flex-direction:column;gap:6px">
            <label id="rpt-sp-prompt-label" style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(122,122,122,1)">Prompt</label>
            <textarea id="rpt-sp-prompt" rows="5" placeholder="Describe what you want this report to show…"
              style="background:rgba(41,40,39,1);border:1px solid rgba(61,61,61,1);border-radius:8px;color:#fff;font-family:Figtree;font-size:13px;line-height:1.5;padding:8px 12px;width:100%;outline:none;resize:vertical;transition:border-color .2s"
              onfocus="this.style.borderColor='rgba(204,195,149,0.6)'" onblur="this.style.borderColor='rgba(61,61,61,1)'"></textarea>
          </div>

          <!-- Buttons: document report variant -->
          <div id="rpt-sp-buttons-doc" style="display:flex;flex-direction:column;gap:10px">
            <button type="button" onclick="rptSaveAndRegenerate()"
              style="display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 16px;background:rgba(204,195,149,0.15);border:1px solid rgba(204,195,149,0.35);border-radius:10px;color:rgba(204,195,149,1);font-family:Figtree;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s,border-color .2s;width:100%"
              onmouseover="this.style.background='rgba(204,195,149,0.25)';this.style.borderColor='rgba(204,195,149,0.6)'"
              onmouseout="this.style.background='rgba(204,195,149,0.15)';this.style.borderColor='rgba(204,195,149,0.35)'">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
              Regenerate Report
            </button>
            <button type="button" onclick="rptSaveMeta()"
              style="display:flex;align-items:center;justify-content:center;padding:8px 16px;background:transparent;border:1px solid rgba(61,61,61,1);border-radius:10px;color:rgba(122,122,122,1);font-family:Figtree;font-size:13px;cursor:pointer;transition:background .2s,border-color .2s,color .2s;width:100%"
              onmouseover="this.style.background='rgba(61,61,61,0.5)';this.style.color='#fff'"
              onmouseout="this.style.background='transparent';this.style.color='rgba(122,122,122,1)'">
              Save Changes
            </button>
          </div>

          <!-- Buttons: CSV report variant (iterative refine + run) -->
          <div id="rpt-sp-buttons-csv" style="display:none;flex-direction:column;gap:10px">
            <button type="button" onclick="rptRefineWithAI()"
              style="display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 16px;background:rgba(204,195,149,0.15);border:1px solid rgba(204,195,149,0.35);border-radius:10px;color:rgba(204,195,149,1);font-family:Figtree;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s,border-color .2s;width:100%"
              onmouseover="this.style.background='rgba(204,195,149,0.25)';this.style.borderColor='rgba(204,195,149,0.6)'"
              onmouseout="this.style.background='rgba(204,195,149,0.15)';this.style.borderColor='rgba(204,195,149,0.35)'">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L9.5 8.5 3 11l6.5 2.5L12 20l2.5-6.5L21 11l-6.5-2.5L12 2z"/></svg>
              Refine
            </button>
            <button type="button" onclick="rptRunQuery()"
              style="display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;background:transparent;border:1px solid rgba(61,61,61,1);border-radius:10px;color:rgba(220,220,220,1);font-family:Figtree;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s,border-color .2s,color .2s;width:100%"
              onmouseover="this.style.background='rgba(61,61,61,0.5)';this.style.borderColor='rgba(122,122,122,1)'"
              onmouseout="this.style.background='transparent';this.style.borderColor='rgba(61,61,61,1)'">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
              Run Report
            </button>
            <button type="button" id="rpt-sp-btn-undo" onclick="rptUndo()" disabled
              style="display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 16px;background:transparent;border:1px solid rgba(61,61,61,1);border-radius:10px;color:rgba(122,122,122,1);font-family:Figtree;font-size:13px;font-weight:600;cursor:not-allowed;opacity:0.5;transition:background .2s,border-color .2s,color .2s,opacity .2s;width:100%">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/></svg>
              Undo
            </button>
            <button type="button" onclick="rptSaveMeta()"
              style="display:flex;align-items:center;justify-content:center;padding:8px 16px;background:transparent;border:1px solid rgba(61,61,61,1);border-radius:10px;color:rgba(122,122,122,1);font-family:Figtree;font-size:13px;cursor:pointer;transition:background .2s,border-color .2s,color .2s;width:100%"
              onmouseover="this.style.background='rgba(61,61,61,0.5)';this.style.color='#fff'"
              onmouseout="this.style.background='transparent';this.style.color='rgba(122,122,122,1)'">
              Save Changes
            </button>
          </div>

        </div>

        <!-- Footer: last run -->
        <div style="padding:14px 20px;border-top:1px solid rgba(61,61,61,1)">
          <div style="font-size:11px;color:rgba(82,82,82,1)">Last run: <span id="rpt-detail-lastrun" style="color:rgba(122,122,122,1)">—</span></div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Panel: New Report Form ─────────────────────────────── -->
  <div id="rpt-panel-form" class="classes-view" style="display:none">
    <header class="panel-header">
      <h2 class="panel-title">New Report</h2>
    </header>

    <div class="panel-body flex flex-col gap-[30px] p-[20px] bg-[var(--colors-bg-moderate)] rounded-[20px] border border-[var(--colors-border-moderate)]">
      
      <!-- Details Section -->
      <div class="form-section">
        <h3 class="typography-body-lg font-bold text-[var(--colors-text-strong)]">Details</h3>
        <div class="flex flex-col gap-4 w-full">
          <div class="form-field">
            <label class="field-label">Report Name</label>
            <div class="form-input focus-within:border-[var(--colors-primary-default)] transition-all flex items-center">
              <input id="rpt-f-name" type="text" placeholder="e.g. Monthly Revenue Summary" class="bg-transparent border-none text-white w-full outline-none" />
            </div>
          </div>
        </div>
      </div>

      <!-- Report Format Section -->
      <div class="form-section">
        <h3 class="typography-body-lg font-bold text-[var(--colors-text-strong)]">Report Format</h3>
        <div class="flex flex-col md:flex-row gap-4 w-full mt-2">
          <!-- Card for Document Style -->
          <label class="flex-1 cursor-pointer select-none">
            <input type="radio" name="rpt-f-type" value="document" checked class="rpt-format-card-input" />
            <div class="rpt-format-card">
              <span class="rpt-format-title">Document Style</span>
              <span class="rpt-format-desc">Narrative summaries, rich charts, and structured chapters. Ideal for visual business reviews.</span>
            </div>
          </label>
          <!-- Card for CSV Style -->
          <label class="flex-1 cursor-pointer select-none">
            <input type="radio" name="rpt-f-type" value="csv" class="rpt-format-card-input" />
            <div class="rpt-format-card">
              <span class="rpt-format-title">CSV / Table Style</span>
              <span class="rpt-format-desc">Deep single-table row export. Generates robust database queries, preview tables, and instant CSV downloads.</span>
            </div>
          </label>
        </div>
      </div>

      <!-- Instructions Section -->
      <div class="form-section">
        <div class="flex flex-col md:flex-row md:items-center justify-between w-full gap-4">
          <h3 class="typography-body-lg font-bold text-[var(--colors-text-strong)] m-0">Instructions</h3>
          <div class="flex gap-2 flex-wrap items-center">
            <span class="text-xs text-[var(--colors-text-moderate)] font-bold uppercase tracking-wider mr-1">Quick Start:</span>
            <button type="button" class="panel-btn panel-btn--outline text-xs px-3 py-1.5 h-auto" onclick="rptApplyQuickStart('financial')">Financial</button>
            <button type="button" class="panel-btn panel-btn--outline text-xs px-3 py-1.5 h-auto" onclick="rptApplyQuickStart('membership')">Members</button>
            <button type="button" class="panel-btn panel-btn--outline text-xs px-3 py-1.5 h-auto" onclick="rptApplyQuickStart('classes')">Classes</button>
            <button type="button" class="panel-btn panel-btn--outline text-xs px-3 py-1.5 h-auto" onclick="rptApplyQuickStart('staff')">Staff</button>
            <button type="button" class="panel-btn panel-btn--outline text-xs px-3 py-1.5 h-auto border-[var(--colors-primary-default)] text-[var(--colors-primary-default)]" onclick="rptApplyQuickStart('multi')">★ All-in-One</button>
          </div>
        </div>
        <div class="flex flex-col gap-4 w-full">
          <div class="form-field">
            <label class="field-label">Describe what you want this report to show</label>
            <div class="form-input focus-within:border-[var(--colors-primary-default)] transition-all flex flex-col items-start gap-2 p-4 h-auto min-h-[120px]">
              <textarea id="rpt-f-prompt" placeholder="e.g. Summarize our main revenue streams, show a breakdown of product orders, and include a donut chart for members vs bookings revenue." class="bg-transparent border-none text-white w-full outline-none resize-y min-h-[80px]" rows="4"></textarea>
            </div>
          </div>
        </div>
      </div>

      <!-- Date Range Section -->
      <div class="form-section">
        <h3 class="typography-body-lg font-bold text-[var(--colors-text-strong)]">Date Range</h3>
        <div class="flex flex-col gap-4 w-full">
          <div class="form-field">
            <label class="field-label">Range</label>
            <div class="relative w-full">
              <div class="form-input form-input--select focus-within:border-[var(--colors-primary-default)] transition-all flex items-center pr-10">
                <select id="rpt-f-range" class="bg-transparent border-none text-white w-full outline-none appearance-none cursor-pointer">
                  <option value="last_7_days" style="background:#1a1a1a">Last 7 days</option>
                  <option value="last_30_days" style="background:#1a1a1a" selected>Last 30 days</option>
                  <option value="last_90_days" style="background:#1a1a1a">Last 90 days</option>
                  <option value="this_month" style="background:#1a1a1a">This Month</option>
                  <option value="last_month" style="background:#1a1a1a">Last Month</option>
                  <option value="this_year" style="background:#1a1a1a">This Year</option>
                  <option value="all_time" style="background:#1a1a1a">All Time</option>
                </select>
              </div>
              <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none flex items-center">
                <img class="field-icon w-3 h-3" src="/static/img/chevron-down-small.svg" alt="" />
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Error message container -->
      <div id="rpt-form-error" style="color:#e05252;font-size:13px;display:none;padding:0 20px"></div>

      <!-- Action buttons -->
      <div class="flex justify-end gap-4 mt-6">
        <button type="button" class="panel-btn panel-btn--outline w-auto px-6 h-[48px]" onclick="rptCancelForm()">Cancel</button>
        <button type="button" class="panel-btn w-auto px-6 h-[48px]" onclick="rptSubmitForm()">Generate Report</button>
      </div>

    </div>
  </div>

</div>

<script>
(function () {
  var _detailReport = null;

  // ── Panel navigation ────────────────────────────────────────
  function show(id) {
    ["rpt-panel-list", "rpt-panel-detail", "rpt-panel-form"].forEach(function (p) {
      document.getElementById(p).style.display = p === id ? "" : "none";
    });
  }

  window.rptShowList = function () {

    show("rpt-panel-list");

  // ── List: load & render ─────────────────────────────────────
  function loadReports() {
    fetch("/api/reports")
      .then(function (r) { return r.json(); })
      .then(renderTable)
      .catch(function () {
        document.getElementById("rpt-tbody").innerHTML =
          '<tr><td colspan="4" class="data-table__cell" style="text-align:center;color:#e05252">Failed to load reports.</td></tr>';
      });
  }

  function renderTable(reports) {
    var tbody = document.getElementById("rpt-tbody");
    if (!reports.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="data-table__cell" style="text-align:center;color:rgba(122,122,122,1)">No reports yet. Create one above.</td></tr>';
      return;
    }
    tbody.innerHTML = reports.map(function (r) {
      var range = r.start && r.end ? r.start + " – " + r.end : r.start || r.end || "—";
      var typeBadge = r.type === "csv"
        ? ' <span style="display:inline-block; font-size:10px; font-weight:700; background:rgba(204,195,149,0.15); border:1px solid rgba(204,195,149,0.35); color:rgba(204,195,149,1); border-radius:4px; padding:1px 6px; margin-left:8px; vertical-align:middle; text-transform:uppercase">CSV</span>'
        : ' <span style="display:inline-block; font-size:10px; font-weight:700; background:rgba(108,92,231,0.15); border:1px solid rgba(108,92,231,0.35); color:rgba(108,92,231,1); border-radius:4px; padding:1px 6px; margin-left:8px; vertical-align:middle; text-transform:uppercase">DOC</span>';
      return '<tr class="data-table__row" style="cursor:pointer" onclick="rptShowDetail(\'' + r.id + '\')">'
        + '<td class="data-table__cell">' + esc(r.name) + typeBadge + '</td>'
        + '<td class="data-table__cell">' + esc(range) + '</td>'
        + '<td class="data-table__cell">' + esc(r.last_run) + '</td>'
        + '<td class="data-table__cell data-table__cell--actions">'

        +   '</button>'

  function rptGetCSVSkeletonHTML() {
    var headerWidths = ['18%','22%','15%','20%','12%','13%'];
    var rowWidths = [
      ['25%','30%','18%','12%','15%','10%'],
      ['20%','35%','15%','15%','10%','15%'],
      ['28%','25%','20%','12%','15%','10%'],
      ['22%','32%','18%','14%','12%','12%'],
      ['30%','28%','15%','12%','15%','10%'],
      ['18%','38%','15%','15%','14%','10%'],
      ['25%','30%','20%','12%','13%','10%'],
      ['22%','30%','18%','15%','15%','10%'],
      ['28%','25%','15%','15%','17%','10%'],

    var html = '<div class="rpt-skeleton">';

    html += '    <div style="height:18px; width:220px; background:rgba(255,255,255,0.12); border-radius:4px; margin-bottom:10px"></div>';
    html += '    <div style="height:11px; width:280px; background:rgba(255,255,255,0.06); border-radius:4px"></div>';
    html += '  </div>';
    html += '  <div style="height:42px; width:150px; background:rgba(108,92,231,0.22); border-radius:10px"></div>';

    // Compiled Data Grid label
    html += '<div style="height:11px; width:140px; background:rgba(255,255,255,0.10); border-radius:4px; margin-bottom:12px"></div>';

    // Table frame: header row + body rows

    });
    html += '  </div>';
    rowWidths.forEach(function (row) {
      html += '  <div style="display:flex; gap:16px; padding:14px 16px; border-bottom:1px solid rgba(255,255,255,0.04)">';
      row.forEach(function (w) {
        html += '<div style="height:11px; width:' + w + '; background:rgba(255,255,255,0.06); border-radius:4px"></div>';
      });
      html += '  </div>';
    });
    html += '</div>';

    // Pagination toolbar
    html += '<div style="display:flex; justify-content:space-between; align-items:center; gap:16px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:12px; padding:14px 20px">';
    html += '  <div style="height:11px; width:160px; background:rgba(255,255,255,0.06); border-radius:4px"></div>';
    html += '  <div style="display:flex; gap:6px">';
    html += '    <div style="height:24px; width:32px; background:rgba(255,255,255,0.06); border-radius:6px"></div>';
    html += '    <div style="height:24px; width:32px; background:rgba(255,255,255,0.06); border-radius:6px"></div>';
    html += '    <div style="height:24px; width:90px; background:rgba(255,255,255,0.06); border-radius:6px"></div>';
    html += '    <div style="height:24px; width:32px; background:rgba(255,255,255,0.06); border-radius:6px"></div>';
    html += '    <div style="height:24px; width:32px; background:rgba(255,255,255,0.06); border-radius:6px"></div>';
    html += '  </div>';
    html += '  <div style="height:24px; width:150px; background:rgba(255,255,255,0.06); border-radius:6px"></div>';
    html += '</div>';

    html += '</div>';
    return html;
  }

  function rptSkeletonFor(report) {
    return (report && report.type === "csv")
      ? rptGetCSVSkeletonHTML()
      : rptGetSkeletonHTML(report ? report.name : "");
  }

  function populateDetailPanel(r) {
    _detailReport = r;
    
    var typeBadgeHtml = "";
    var badgeText = document.getElementById("rpt-sp-type-text");
    var badgeEl = document.getElementById("rpt-sp-type-badge");
    
    if (r.type === "csv") {
      typeBadgeHtml = '<span style="display:inline-block; font-size:11px; font-weight:700; background:rgba(204,195,149,0.15); border:1px solid rgba(204,195,149,0.35); color:rgba(204,195,149,1); border-radius:6px; padding:3px 10px; margin-left:12px; vertical-align:middle; text-transform:uppercase">CSV Report</span>';
      if (badgeText && badgeEl) {
        badgeEl.style.background = "rgba(204,195,149,0.15)";
        badgeEl.style.border = "1px solid rgba(204,195,149,0.35)";
        badgeEl.style.color = "rgba(204,195,149,1)";
        badgeText.textContent = "CSV / TABLE";
      }
    } else {
      typeBadgeHtml = '<span style="display:inline-block; font-size:11px; font-weight:700; background:rgba(108,92,231,0.15); border:1px solid rgba(108,92,231,0.35); color:rgba(108,92,231,1); border-radius:6px; padding:3px 10px; margin-left:12px; vertical-align:middle; text-transform:uppercase">Document Report</span>';
      if (badgeText && badgeEl) {
        badgeEl.style.background = "rgba(108,92,231,0.15)";
        badgeEl.style.border = "1px solid rgba(108,92,231,0.35)";
        badgeEl.style.color = "rgba(108,92,231,1)";
        badgeText.textContent = "DOCUMENT STYLE";
      }
    }

    var area = document.getElementById("rpt-content-area");
    if (area) {
      if (r.type === "csv") {
        area.classList.remove("max-w-4xl");
        area.classList.add("max-w-full");
      } else {
        area.classList.remove("max-w-full");
        area.classList.add("max-w-4xl");
      }
    }

    document.getElementById("rpt-detail-title").innerHTML = esc(r.name) + typeBadgeHtml;
    document.getElementById("rpt-detail-lastrun").textContent = r.last_run || "—";

    // Populate side panel fields
    document.getElementById("rpt-sp-name").value   = r.name  || "";
    document.getElementById("rpt-sp-range").value  = r.date_range || "last_30_days";
    document.getElementById("rpt-sp-prompt").value = r.prompt || "";

    // Adapt prompt UI + button block to report type
    var promptLabel = document.getElementById("rpt-sp-prompt-label");
    var promptInput = document.getElementById("rpt-sp-prompt");
    var btnsDoc     = document.getElementById("rpt-sp-buttons-doc");
    var btnsCsv     = document.getElementById("rpt-sp-buttons-csv");
    if (r.type === "csv") {
      if (promptLabel) promptLabel.textContent = "Refine Report";
      if (promptInput) promptInput.placeholder = "e.g. 'remove the date column' or 'group by membership tier'";
      if (btnsDoc) btnsDoc.style.display = "none";
      if (btnsCsv) btnsCsv.style.display = "flex";
    } else {
      if (promptLabel) promptLabel.textContent = "Prompt";
      if (promptInput) promptInput.placeholder = "Describe what you want this report to show…";
      if (btnsDoc) btnsDoc.style.display = "flex";
      if (btnsCsv) btnsCsv.style.display = "none";
    }
  }

  function loadDetailContent(id) {
    var area = document.getElementById("rpt-content-area");
    area.innerHTML = rptSkeletonFor(_detailReport);
    fetch("/api/reports/" + id + "/content")
      .then(function (r) { return r.json(); })
      .then(function (content) {
        if (_detailReport.type === "csv") {
          if (!content.csv_report || !(content.csv_report.sql || "").trim()) {
            area.innerHTML = '<div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">No report yet. Enter what you want and click <strong>Refine</strong> to generate one.</div>';
            updateSaveButtonHighlight(false);
            updateUndoButton(false);
          } else {
            renderCSVReport(content.csv_report);
          }
        } else {
          var sections = content.sections || [];
          if (!sections.length) {
            area.innerHTML = '<div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">No report generated yet. Click "Regenerate Report" to generate.</div>';
          } else {
            renderReportSections(sections);
          }
        }
      })
      .catch(function () {
        area.innerHTML = '<div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">No report generated yet. Click "Regenerate Report" to generate.</div>';
      });
  }

  window.rptShowDetail = function (id) {
    fetch("/api/reports")
      .then(function (r) { return r.json(); })
      .then(function (reports) {
        var r = reports.find(function (x) { return x.id === id; });
        if (!r) return;
        populateDetailPanel(r);
        show("rpt-panel-detail");
        loadDetailContent(id);
      });
  };

  window.rptDelete = function () {
    if (!_detailReport) return;
    if (!confirm('Delete "' + _detailReport.name + '"?')) return;
    fetch("/api/reports/" + _detailReport.id, { method: "DELETE" })
      .then(function () { window.rptShowList(); });
  };

  // ── Save metadata (side panel fields) ──────────────────────
  function collectSidePanelPayload() {
    return {
      name:       document.getElementById("rpt-sp-name").value.trim()   || _detailReport.name,
      type:       _detailReport.type,
      date_range: document.getElementById("rpt-sp-range").value,
      prompt:     document.getElementById("rpt-sp-prompt").value.trim(),
    };
  }

  window.rptSaveMeta = function () {
    if (!_detailReport) return;
    var payload = collectSidePanelPayload();
    fetch("/api/reports/" + _detailReport.id, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    })
      .then(function (r) { if (!r.ok) throw new Error(); return r.json(); })
      .then(function (saved) {
        _detailReport = saved;

        var typeBadgeHtml = "";
        if (saved.type === "csv") {
          typeBadgeHtml = '<span style="display:inline-block; font-size:11px; font-weight:700; background:rgba(204,195,149,0.15); border:1px solid rgba(204,195,149,0.35); color:rgba(204,195,149,1); border-radius:6px; padding:3px 10px; margin-left:12px; vertical-align:middle; text-transform:uppercase">CSV Report</span>';
        } else {
          typeBadgeHtml = '<span style="display:inline-block; font-size:11px; font-weight:700; background:rgba(108,92,231,0.15); border:1px solid rgba(108,92,231,0.35); color:rgba(108,92,231,1); border-radius:6px; padding:3px 10px; margin-left:12px; vertical-align:middle; text-transform:uppercase">Document Report</span>';
        }
        document.getElementById("rpt-detail-title").innerHTML = esc(saved.name) + typeBadgeHtml;

        // For CSV reports, also commit any pending SQL draft.
        if (saved.type === "csv") {
          return fetch("/api/reports/" + saved.id + "/commit", { method: "POST" })
            .then(function (r) { if (!r.ok) throw new Error(); return r.json(); })
            .then(function (content) {
              renderCSVReport(content.csv_report || {});
            });
        }
      })
      .catch(function () { alert("Failed to save changes."); });
  };

  // ── Save + regenerate ───────────────────────────────────────
  window.rptSaveAndRegenerate = function () {
    if (!_detailReport) return;
    var payload = collectSidePanelPayload();
    var area = document.getElementById("rpt-content-area");
    area.innerHTML = '<div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">Saving…</div>';

    fetch("/api/reports/" + _detailReport.id, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    })
      .then(function (r) { if (!r.ok) throw new Error(); return r.json(); })
      .then(function (saved) {
        _detailReport = saved;
        
        var typeBadgeHtml = "";
        if (saved.type === "csv") {
          typeBadgeHtml = '<span style="display:inline-block; font-size:11px; font-weight:700; background:rgba(204,195,149,0.15); border:1px solid rgba(204,195,149,0.35); color:rgba(204,195,149,1); border-radius:6px; padding:3px 10px; margin-left:12px; vertical-align:middle; text-transform:uppercase">CSV Report</span>';
        } else {
          typeBadgeHtml = '<span style="display:inline-block; font-size:11px; font-weight:700; background:rgba(108,92,231,0.15); border:1px solid rgba(108,92,231,0.35); color:rgba(108,92,231,1); border-radius:6px; padding:3px 10px; margin-left:12px; vertical-align:middle; text-transform:uppercase">Document Report</span>';
        }
        document.getElementById("rpt-detail-title").innerHTML = esc(saved.name) + typeBadgeHtml;
        area.innerHTML = rptGetSkeletonHTML(saved.name);
        return fetch("/api/reports/" + saved.id + "/generate", { method: "POST" });
      })
      .then(function (r) { if (!r.ok) throw new Error(); return r.json(); })
      .then(function (content) {
        if (content.generated_at) {
          document.getElementById("rpt-detail-lastrun").textContent = content.generated_at;
          _detailReport.last_run = content.generated_at;
        }
        if (_detailReport.type === "csv") {
          renderCSVReport(content.csv_report || {});
        } else {
          renderReportSections(content.sections || []);
        }
      })
      .catch(function () {
        area.innerHTML = '<div style="color:#e05252;font-size:14px;text-align:center;padding:48px 0">Failed to generate report. Please try again.</div>';
      });
  };

  // ── Date range change: auto-refine for CSV reports ──
  window.rptOnDateRangeChange = function () {
    if (!_detailReport) return;
    if (_detailReport.type !== "csv") return;
    // The stored SQL has the previous range's dates baked in, so we need to
    // regenerate via the AI refine path to pick up the new range.
    window.rptRefineWithAI();
  };

  // ── CSV: Refine with AI (save prompt + call AI to update SQL) ──
  window.rptRefineWithAI = function () {
    if (!_detailReport) return;
    var payload = collectSidePanelPayload();
    var area = document.getElementById("rpt-content-area");
    area.innerHTML = rptGetCSVSkeletonHTML();

    fetch("/api/reports/" + _detailReport.id, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    })
      .then(function (r) { if (!r.ok) throw new Error("save failed"); return r.json(); })
      .then(function (saved) {
        _detailReport = saved;
        var typeBadgeHtml = '<span style="display:inline-block; font-size:11px; font-weight:700; background:rgba(204,195,149,0.15); border:1px solid rgba(204,195,149,0.35); color:rgba(204,195,149,1); border-radius:6px; padding:3px 10px; margin-left:12px; vertical-align:middle; text-transform:uppercase">CSV Report</span>';
        document.getElementById("rpt-detail-title").innerHTML = esc(saved.name) + typeBadgeHtml;
        return fetch("/api/reports/" + saved.id + "/refine", { method: "POST" });
      })
      .then(function (r) {
        return r.json().then(function (body) { return { ok: r.ok, body: body }; });
      })
      .then(function (res) {
        if (!res.ok) {
          var msg = (res.body && res.body.error) || "Failed to refine report.";
          area.innerHTML = '<div style="color:#e05252;font-size:14px;text-align:center;padding:48px 0">' + esc(msg) + '</div>';
          return;
        }
        var content = res.body;
        if (content.generated_at) {
          document.getElementById("rpt-detail-lastrun").textContent = content.generated_at;
          _detailReport.last_run = content.generated_at;
        }
        renderCSVReport(content.csv_report || {});
      })
      .catch(function () {
        area.innerHTML = '<div style="color:#e05252;font-size:14px;text-align:center;padding:48px 0">Failed to refine report. Please try again.</div>';
      });
  };

  // ── CSV: Run Query (re-execute stored SQL, no AI) ───────────────
  window.rptRunQuery = function () {
    if (!_detailReport) return;
    var area = document.getElementById("rpt-content-area");
    area.innerHTML = rptGetCSVSkeletonHTML();

    fetch("/api/reports/" + _detailReport.id + "/run", { method: "POST" })
      .then(function (r) {
        return r.json().then(function (body) { return { ok: r.ok, body: body }; });
      })
      .then(function (res) {
        if (!res.ok) {
          var msg = (res.body && res.body.error) || "Failed to run report.";
          area.innerHTML = '<div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">' + esc(msg) + '</div>';
          return;
        }
        var content = res.body;
        if (content.generated_at) {
          document.getElementById("rpt-detail-lastrun").textContent = content.generated_at;
          _detailReport.last_run = content.generated_at;
        }
        renderCSVReport(content.csv_report || {});
      })
      .catch(function () {
        area.innerHTML = '<div style="color:#e05252;font-size:14px;text-align:center;padding:48px 0">Failed to run report. Please try again.</div>';
      });
  };

  // ── Highlight Save Changes when CSV draft differs from saved ──
  function updateSaveButtonHighlight(hasDraft) {
    var block = document.getElementById("rpt-sp-buttons-csv");
    if (!block) return;
    var btn = block.querySelector('button[onclick="rptSaveMeta()"]');
    if (!btn) return;
    if (hasDraft) btn.classList.add('rpt-save-dirty');
    else          btn.classList.remove('rpt-save-dirty');
  }

  // ── Enable/disable Undo based on draft + history availability ──
  function updateUndoButton(canUndo) {
    var btn = document.getElementById("rpt-sp-btn-undo");
    if (!btn) return;
    btn.disabled = !canUndo;
    btn.style.opacity = canUndo ? "1" : "0.5";
    btn.style.cursor = canUndo ? "pointer" : "not-allowed";
    btn.style.color = canUndo ? "rgba(220,220,220,1)" : "rgba(122,122,122,1)";
  }

  // ── Undo most recent change (discard draft, else pop history) ──
  window.rptUndo = function () {
    if (!_detailReport) return;
    var area = document.getElementById("rpt-content-area");
    area.innerHTML = rptGetCSVSkeletonHTML();
    fetch("/api/reports/" + _detailReport.id + "/undo", { method: "POST" })
      .then(function (r) {
        return r.json().then(function (body) { return { ok: r.ok, body: body }; });
      })
      .then(function (res) {
        if (!res.ok) {
          var msg = (res.body && res.body.error) || "Nothing to undo.";
          area.innerHTML = '<div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">' + esc(msg) + '</div>';
          return;
        }
        renderCSVReport((res.body && res.body.csv_report) || {});
      })
      .catch(function () {
        area.innerHTML = '<div style="color:#e05252;font-size:14px;text-align:center;padding:48px 0">Failed to undo. Please try again.</div>';
      });
  };

  // ── CSV Rendering and Download ──────────────────────────────
  function renderCSVReport(rawCsvReport) {
    var area = document.getElementById("rpt-content-area");
    // If an unsaved AI draft exists, display it (and highlight Save Changes).
    var draft = rawCsvReport && rawCsvReport.draft;
    var hasDraft = !!(draft && (draft.sql || '').trim());
    var hasHistory = !!(rawCsvReport && rawCsvReport.history && rawCsvReport.history.length);
    updateSaveButtonHighlight(hasDraft);
    updateUndoButton(hasDraft || hasHistory);
    var csvReport = hasDraft ? draft : rawCsvReport;

    if (!csvReport || csvReport.error) {
      var errMsg = csvReport ? csvReport.error : "Unknown error generating CSV report.";
      area.innerHTML = '<div style="margin-bottom:28px">'
        + '<h3 style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:rgba(122,122,122,1);margin-bottom:8px">CSV Compilation Error</h3>'
        + '<div style="font-size:13px;color:#e05252;background:rgba(224,82,82,0.08);border:1px solid rgba(224,82,82,0.3);border-radius:8px;padding:16px">' + esc(errMsg) + '</div>'
        + '</div>';
      return;
    }

    window.rptCurrentCSVData = csvReport;
    window.rptCSVState = {
      currentPage: 1,
      pageSize: 50
    };

    var columns = csvReport.columns || [];
    var rows = csvReport.rows || [];

    var html = "";

    // 1. Premium Download Card
    html += '<div style="background:linear-gradient(135deg, rgba(108,92,231,0.12) 0%, rgba(204,195,149,0.04) 100%); border:1px solid rgba(108,92,231,0.25); border-radius:16px; padding:24px; margin-bottom:32px; display:flex; flex-direction:row; align-items:center; justify-content:space-between; gap:20px; box-shadow:0 8px 32px rgba(0,0,0,0.15)">';
    html += '  <div style="flex:1">';
    html += '    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px">';
    html += '      <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#2ed573; box-shadow: 0 0 8px #2ed573"></span>';
    html += '      <span style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:#2ed573">Ready for Export</span>';
    html += '    </div>';
    html += '    <h3 style="font-size:18px; font-weight:700; color:#fff; margin:0 0 6px 0">' + esc(csvReport.title || "Data Export") + '</h3>';
    html += '    <p style="font-size:13px; color:rgba(255,255,255,0.6); margin:0">' + rows.length + ' records compiled. Table format is ready for Excel or Google Sheets.</p>';
    html += '  </div>';
    html += '  <button type="button" onclick="rptDownloadCurrentCSV()" style="display:inline-flex; align-items:center; justify-content:center; gap:10px; padding:12px 24px; background:var(--colors-primary-default); border:none; border-radius:10px; color:#fff; font-family:Figtree; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; box-shadow: 0 4px 14px rgba(108,92,231,0.4)" onmouseover="this.style.transform=\'translateY(-1px)\';this.style.boxShadow=\'0 6px 20px rgba(108,92,231,0.6)\'" onmouseout="this.style.transform=\'none\';this.style.boxShadow=\'0 4px 14px rgba(108,92,231,0.4)\'">';
    html += '    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
    html += '    Download CSV';
    html += '  </button>';
    html += '</div>';

    // 2. Dynamic Performance Warning Banner
    html += '<div id="csv-perf-warning" style="display:none; align-items:center; gap:12px; background:rgba(230,126,34,0.08); border:1px solid rgba(230,126,34,0.3); border-radius:12px; padding:14px 18px; margin-bottom:20px; animation: fadeIn 0.3s ease-out">';
    html += '  <span style="font-size:18px; line-height:1">⚠️</span>';
    html += '  <span style="font-size:13px; color:#e67e22; font-family:Figtree"><strong>Performance Warning:</strong> Displaying a large dataset simultaneously in the browser can cause minor scrolling stutter. For extremely large sets, downloading the raw CSV is recommended.</span>';
    html += '</div>';

    // 3. Scrollable Table Container
    html += '<div style="margin-bottom:20px">';
    html += '  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">';
    html += '    <h4 style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:rgba(255,255,255,0.4); margin:0">Compiled Data Grid</h4>';
    html += '  </div>';
    
    html += '  <div style="width:100%; overflow-x:auto; border:1px solid rgba(255,255,255,0.06); border-radius:12px; background:rgba(0,0,0,0.15)">';
    html += '    <table style="width:100%; border-collapse:collapse; text-align:left; font-size:13px">';
    
    if (columns.length) {
      html += '      <thead>';
      html += '        <tr style="background:rgba(255,255,255,0.03); position:sticky; top:0; z-index:10; backdrop-filter:blur(8px); border-bottom:1px solid rgba(255,255,255,0.08)">';
      columns.forEach(function (col) {
        html += '          <th style="padding:14px 16px; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:rgba(255,255,255,0.4); font-weight:600; background:rgba(20,20,20,0.95); border-bottom:1px solid rgba(255,255,255,0.08)">' + esc(col) + '</th>';
      });
      html += '        </tr>';
      html += '      </thead>';
    }
    
    html += '      <tbody id="csv-tbody"></tbody>';
    html += '    </table>';
    html += '  </div>';
    html += '</div>';

    // 4. Pagination Toolbar
    html += '<div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:12px; padding:12px 20px; margin-bottom:24px">';
    html += '  <div id="csv-pagination-info" style="font-size:13px; color:rgba(255,255,255,0.5); font-family:Figtree">Showing 0 - 0 of 0 rows</div>';
    
    html += '  <div style="display:flex; align-items:center; gap:6px">';
    html += '    <button type="button" onclick="rptChangeCSVPage(\'first\')" style="padding:6px 12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:6px; color:#fff; font-size:11px; font-weight:600; cursor:pointer; transition:all 0.2s" onmouseover="this.style.background=\'rgba(255,255,255,0.12)\';this.style.borderColor=\'rgba(255,255,255,0.15)\'" onmouseout="this.style.background=\'rgba(255,255,255,0.04)\';this.style.borderColor=\'rgba(255,255,255,0.08)\'">&lt;&lt;</button>';
    html += '    <button type="button" onclick="rptChangeCSVPage(\'prev\')" style="padding:6px 12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:6px; color:#fff; font-size:11px; font-weight:600; cursor:pointer; transition:all 0.2s" onmouseover="this.style.background=\'rgba(255,255,255,0.12)\';this.style.borderColor=\'rgba(255,255,255,0.15)\'" onmouseout="this.style.background=\'rgba(255,255,255,0.04)\';this.style.borderColor=\'rgba(255,255,255,0.08)\'">&lt;</button>';
    html += '    <span id="csv-page-indicator" style="font-size:13px; color:#fff; font-family:Figtree; min-width:90px; text-align:center; font-weight:600">Page 1 of 1</span>';
    html += '    <button type="button" onclick="rptChangeCSVPage(\'next\')" style="padding:6px 12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:6px; color:#fff; font-size:11px; font-weight:600; cursor:pointer; transition:all 0.2s" onmouseover="this.style.background=\'rgba(255,255,255,0.12)\';this.style.borderColor=\'rgba(255,255,255,0.15)\'" onmouseout="this.style.background=\'rgba(255,255,255,0.04)\';this.style.borderColor=\'rgba(255,255,255,0.08)\'">&gt;</button>';
    html += '    <button type="button" onclick="rptChangeCSVPage(\'last\')" style="padding:6px 12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:6px; color:#fff; font-size:11px; font-weight:600; cursor:pointer; transition:all 0.2s" onmouseover="this.style.background=\'rgba(255,255,255,0.12)\';this.style.borderColor=\'rgba(255,255,255,0.15)\'" onmouseout="this.style.background=\'rgba(255,255,255,0.04)\';this.style.borderColor=\'rgba(255,255,255,0.08)\'">&gt;&gt;</button>';
    html += '  </div>';
    
    html += '  <div style="display:flex; align-items:center; gap:8px">';
    html += '    <span style="font-size:13px; color:rgba(255,255,255,0.5); font-family:Figtree">Rows per page:</span>';
    html += '    <select onchange="rptChangeCSVPageSize(this.value)" style="background:rgba(20,20,20,0.9); border:1px solid rgba(255,255,255,0.15); border-radius:6px; color:#fff; font-family:Figtree; font-size:13px; font-weight:600; padding:4px 10px; cursor:pointer; outline:none">';
    html += '      <option value="50">50</option>';
    html += '      <option value="100">100</option>';
    html += '      <option value="250">250</option>';
    html += '      <option value="all">Show All</option>';
    html += '    </select>';
    html += '  </div>';
    html += '</div>';

    area.innerHTML = html;
    renderCSVTablePage();
  }

  window.renderCSVTablePage = function () {
    var csvReport = window.rptCurrentCSVData;
    if (!csvReport) return;

    var rows = csvReport.rows || [];
    var columns = csvReport.columns || [];
    var state = window.rptCSVState;

    var totalRows = rows.length;
    var pageSize = state.pageSize === "all" ? totalRows : Number(state.pageSize);
    var totalPages = pageSize === 0 ? 1 : Math.ceil(totalRows / pageSize);

    if (state.currentPage > totalPages) state.currentPage = totalPages;
    if (state.currentPage < 1) state.currentPage = 1;

    var startIndex = state.pageSize === "all" ? 0 : (state.currentPage - 1) * pageSize;
    var endIndex = state.pageSize === "all" ? totalRows : Math.min(startIndex + pageSize, totalRows);

    var tbody = document.getElementById("csv-tbody");
    if (!tbody) return;

    var slicedRows = rows.slice(startIndex, endIndex);
    var html = "";

    if (!slicedRows.length) {
      html += '<tr><td colspan="' + (columns.length || 1) + '" style="padding:24px; text-align:center; color:rgba(255,255,255,0.3)">No data available in table.</td></tr>';
    } else {
      slicedRows.forEach(function (row, index) {
        var actualIndex = startIndex + index;
        html += '<tr style="border-bottom:1px solid rgba(255,255,255,0.04); background:' + (actualIndex % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.01)') + '" class="data-table__row">';
        row.forEach(function (cell) {
          var val = cell == null ? "" : cell;
          html += '<td style="padding:12px 16px; color:#fff; font-family:Figtree; white-space:nowrap">' + esc(String(val)) + '</td>';
        });
        html += '</tr>';
      });
    }

    tbody.innerHTML = html;

    // Update Pagination Label
    var startDisp = totalRows ? startIndex + 1 : 0;
    var pageInfoText = "Showing " + startDisp + " - " + endIndex + " of " + totalRows + " rows";
    document.getElementById("csv-pagination-info").textContent = pageInfoText;
    document.getElementById("csv-page-indicator").textContent = "Page " + state.currentPage + " of " + totalPages;

    // Toggle performance warning
    var warningEl = document.getElementById("csv-perf-warning");
    if (warningEl) {
      if (state.pageSize === "all" && totalRows > 500) {
        warningEl.style.display = "flex";
      } else {
        warningEl.style.display = "none";
      }
    }
  };

  window.rptChangeCSVPage = function (direction) {
    var state = window.rptCSVState;
    var csvReport = window.rptCurrentCSVData;
    if (!csvReport) return;

    var rows = csvReport.rows || [];
    var totalRows = rows.length;
    var pageSize = state.pageSize === "all" ? totalRows : Number(state.pageSize);
    var totalPages = pageSize === 0 ? 1 : Math.ceil(totalRows / pageSize);

    if (direction === "first") state.currentPage = 1;
    else if (direction === "prev") state.currentPage = Math.max(1, state.currentPage - 1);
    else if (direction === "next") state.currentPage = Math.min(totalPages, state.currentPage + 1);
    else if (direction === "last") state.currentPage = totalPages;

    renderCSVTablePage();
  };

  window.rptChangeCSVPageSize = function (size) {
    window.rptCSVState.pageSize = size;
    window.rptCSVState.currentPage = 1;
    renderCSVTablePage();
  };

  window.rptDownloadCurrentCSV = function () {
    var csvReport = window.rptCurrentCSVData;
    if (!csvReport || !csvReport.rows) return;

    var columns = csvReport.columns || [];
    var rows = csvReport.rows || [];

    var csvContent = "";

    function escapeCSV(val) {
      if (val == null) return '""';
      var str = String(val);
      if (str.includes('"') || str.includes(',') || str.includes('\n') || str.includes('\r')) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    }

    if (columns.length) {
      csvContent += columns.map(escapeCSV).join(",") + "\r\n";
    }

    rows.forEach(function (row) {
      csvContent += row.map(escapeCSV).join(",") + "\r\n";
    });

    var blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var link = document.createElement("a");
    var filename = (csvReport.title || "export")
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "_")
      .replace(/(^_+|_+$)/g, "") + ".csv";

    link.setAttribute("href", url);
    link.setAttribute("download", filename);
    link.style.visibility = "hidden";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  };

  // ── Section renderer ────────────────────────────────────────
  function renderReportSections(sections) {
    var area = document.getElementById("rpt-content-area");
    if (!sections.length) {
      area.innerHTML = '<div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">No sections generated.</div>';
      return;
    }

    var html = "";
    var chartQueue = [];

    function renderError(title, message) {
      var out = '<div style="margin-bottom:28px">';
      if (title) out += '<h3 style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:rgba(122,122,122,1);margin-bottom:8px">' + esc(title) + '</h3>';
      out += '<div style="font-size:13px;color:#e0a052;background:rgba(224,160,82,0.08);border:1px solid rgba(224,160,82,0.3);border-radius:8px;padding:12px">' + esc(message) + '</div>';
      out += '</div>';
      return out;
    }

    function renderSectionHeader(title) {
      if (!title) return '';
      return '<h3 style="font-size:14px;font-weight:600;letter-spacing:.02em;color:#fff;margin-bottom:12px">' + esc(title) + '</h3>';
    }

    function renderRichContent(content) {
      if (!content) return '';
      if (!window.marked || !window.DOMPurify) {
        return '<div class="rpt-md"><p>' + esc(content) + '</p></div>';
      }
      var normalized = content.replace(/(?:^|\s)(\d+\.\s)/g, '\n$1').replace(/^\n+/, '');
      marked.setOptions({ breaks: true, gfm: true });
      var html = marked.parse(normalized);
      return '<div class="rpt-md">' + DOMPurify.sanitize(html) + '</div>';
    }

    function renderSectionContent(content) {
      return renderRichContent(content);
    }

    sections.forEach(function (sec, i) {
      if (sec.error && sec.type !== "text") {
        html += renderError(sec.title, sec.error);
        return;
      }

      if (sec.type === "text") {
        html += '<div style="margin-bottom:32px">';
        html += renderSectionHeader(sec.title);
        html += renderRichContent(sec.content || "");
        html += '</div>';

      } else if (sec.type === "table") {
        html += '<div style="margin-bottom:32px">';
        html += renderSectionHeader(sec.title);
        html += renderSectionContent(sec.content);
        html += '<table style="width:100%;border-collapse:collapse">';
        if (sec.columns && sec.columns.length) {
          html += '<thead><tr>';
          sec.columns.forEach(function (col) {
            html += '<th style="text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:rgba(122,122,122,1);border-bottom:1px solid rgba(61,61,61,1)">' + esc(col) + '</th>';
          });
          html += '</tr></thead>';
        }
        html += '<tbody>';
        (sec.rows || []).forEach(function (row) {
          html += '<tr class="data-table__row">';
          row.forEach(function (cell) {
            html += '<td style="padding:10px 12px;font-size:13px;color:#fff;border-bottom:1px solid rgba(61,61,61,0.5)">' + esc(String(cell == null ? "" : cell)) + '</td>';
          });
          html += '</tr>';
        });
        html += '</tbody></table>';
        html += '</div>';

      } else if (sec.type === "chart") {
        var chartId = "rpt-chart-" + i;
        html += '<div style="margin-bottom:32px">';
        html += renderSectionHeader(sec.title);
        html += renderSectionContent(sec.content);
        html += '<div id="' + chartId + '" style="height:240px;width:100%"></div>';
        html += '</div>';
        if (sec.spec) chartQueue.push({ id: chartId, spec: sec.spec });
      }
    });

    area.innerHTML = html;

    chartQueue.forEach(function (c) {
      var el = document.getElementById(c.id);
      if (el && window.Plotly) {
        Plotly.newPlot(el, c.spec.data, c.spec.layout, { responsive: true, displayModeBar: false });
      }
    });
  }

  // ── Form: new report ────────────────────────────────────────
  window.rptShowNew = function () {
    clearForm();
    show("rpt-panel-form");
  };

  window.rptCancelForm = function () {
    window.rptShowList();
  };

  window.rptApplyQuickStart = function (key) {
    var promptEl = document.getElementById("rpt-f-prompt");
    var nameEl = document.getElementById("rpt-f-name");
    
    var prompts = {
      financial: "Give me a detailed financial report showing total realized revenue, a breakdown of revenue by source (membership, product, booking), and daily revenue trends.",
      membership: "Give me a membership report showing total memberships, a distribution of memberships by plan type, and a table of customers with active plans.",
      classes: "Give me a class attendance and visit report. Show class attendance (visits) grouped by class name for confirmed check-ins, and a list of the most popular classes.",
      staff: "Give me a staff performance report showing the total classes taught by each instructor (confirmed check-ins), and revenue generated by instructor bookings.",
      multi: "Give me a report on my revenue, my visit count, and my membership count. Include a narrative summary first, daily revenue, daily class attendance visits, and membership plan distribution."
    };
    
    var names = {
      financial: "Financial & Revenue Summary",
      membership: "Membership Distribution Analysis",
      classes: "Class Attendance & Visits Report",
      staff: "Staff Performance & Booking Revenue",
      multi: "Studio Performance Overview (All-in-One)"
    };
    
    if (prompts[key]) {
      promptEl.value = prompts[key];
    }
    if (names[key]) {
      nameEl.value = names[key];
    }
  };

  window.rptSubmitForm = function () {
    var name   = document.getElementById("rpt-f-name").value.trim();
    var prompt = document.getElementById("rpt-f-prompt").value.trim();
    var range  = document.getElementById("rpt-f-range").value;
    var errEl  = document.getElementById("rpt-form-error");
    var type   = document.querySelector('input[name="rpt-f-type"]:checked').value;

    if (!name) {
      errEl.textContent = "Report name is required.";
      errEl.style.display = "";
      return;
    }
    errEl.style.display = "none";

    fetch("/api/reports", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, type: type, prompt: prompt, date_range: range }),
    })
      .then(function (r) { if (!r.ok) throw new Error("Server error"); return r.json(); })
      .then(function (saved) {
        populateDetailPanel(saved);
        show("rpt-panel-detail");
        // Auto-generate on create
        var area = document.getElementById("rpt-content-area");
        area.innerHTML = rptSkeletonFor(saved);
        var genUrl = "/api/reports/" + saved.id + (saved.type === "csv" ? "/refine" : "/generate");
        return fetch(genUrl, { method: "POST" });
      })
      .then(function (r) { if (!r.ok) throw new Error(); return r.json(); })
      .then(function (content) {
        if (content.generated_at) {
          document.getElementById("rpt-detail-lastrun").textContent = content.generated_at;
          _detailReport.last_run = content.generated_at;
        }
        if (_detailReport.type === "csv") {
          renderCSVReport(content.csv_report || {});
        } else {
          renderReportSections(content.sections || []);
        }
      })
      .catch(function () {
        document.getElementById("rpt-form-error").textContent = "Something went wrong. Please try again.";
        document.getElementById("rpt-form-error").style.display = "";
      });
  };

  // ── Helpers ─────────────────────────────────────────────────
  function clearForm() {
    document.getElementById("rpt-f-name").value = "";
    document.getElementById("rpt-f-range").value = "last_30_days";
    document.getElementById("rpt-f-prompt").value = "";
    document.getElementById("rpt-form-error").style.display = "none";
    var radios = document.getElementsByName("rpt-f-type");
    if (radios.length) {
      radios[0].checked = true;
    }
  }

  function esc(s) {
    return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // Boot
  loadReports();
})();
