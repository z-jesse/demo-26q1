<style>
  .rpt-md { font-size: 14px; color: rgba(210,210,210,1); line-height: 1.7; }
  .rpt-md > *:first-child { margin-top: 0; }
  .rpt-md > *:last-child  { margin-bottom: 0; }
  .rpt-md p { margin: 0 0 12px 0; }
  .rpt-md strong { color: #fff; font-weight: 600; }
  .rpt-md em { font-style: italic; }
  .rpt-md ol, .rpt-md ul { margin: 0 0 12px 0; padding-left: 24px; }
  .rpt-md ol { list-style: decimal outside; }
  .rpt-md ul { list-style: disc outside; }
  .rpt-md li { margin: 0 0 6px 0; padding-left: 4px; }
  .rpt-md li::marker { color: rgba(122,122,122,1); }
  .rpt-md h1, .rpt-md h2, .rpt-md h3, .rpt-md h4 {
    color: #fff; font-weight: 600; margin: 16px 0 8px 0;
  }
  .rpt-md h1 { font-size: 18px; }
  .rpt-md h2 { font-size: 16px; }
  .rpt-md h3, .rpt-md h4 { font-size: 14px; }
  .rpt-md code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12.5px; background: rgba(61,61,61,0.6);
    padding: 1px 6px; border-radius: 4px;
  }
  .rpt-md pre {
    background: rgba(41,40,39,1); border: 1px solid rgba(61,61,61,1);
    border-radius: 8px; padding: 12px; overflow-x: auto; margin: 0 0 12px 0;
  }
  .rpt-md pre code { background: transparent; padding: 0; }
  .rpt-md a { color: rgba(204,195,149,1); text-decoration: underline; }
  .rpt-md blockquote {
    border-left: 3px solid rgba(61,61,61,1); padding-left: 12px;
    color: rgba(180,180,180,1); margin: 0 0 12px 0;
  }
</style>
<div class="classes-view" data-colors-mode="dark">

  <!-- ── Panel: List ─────────────────────────────────────────── -->
  <div id="rpt-panel-list" class="classes-view">
    <header class="panel-header">
      <h2 class="panel-title">Reports</h2>
      <button type="button" class="panel-btn" onclick="rptShowNew()">+ New Report</button>
    </header>

    <div class="classes-view__card">
      <table class="data-table">
        <thead>
          <tr>
            <th class="data-table__th">Report Name</th>
            <th class="data-table__th">Date Range</th>
            <th class="data-table__th">Last Run</th>
            <th class="data-table__th data-table__th--actions" aria-label="Actions"></th>
          </tr>
        </thead>
        <tbody id="rpt-tbody">
          <tr><td colspan="4" class="data-table__cell" style="text-align:center;color:rgba(122,122,122,1)">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── Panel: Detail / Edit ───────────────────────────────── -->
  <div id="rpt-panel-detail" class="classes-view" style="display:none">
    <header class="panel-header">
      <button type="button" class="panel-btn" style="margin-right:auto;margin-left:0" onclick="rptShowList()">← Back</button>
      <h2 class="panel-title" id="rpt-detail-title"></h2>
      <button type="button" class="panel-btn" style="color:#e05252" onclick="rptDelete()">Delete</button>
    </header>

    <div style="display:flex;gap:0;flex:1;min-height:0;overflow:hidden;border-radius:var(--MVP-v1-1-container-radius-l);border:1px solid var(--colors-border-moderate)">

      <!-- Main content area -->
      <div style="flex:1;min-width:0;overflow-y:auto;padding:24px 28px;scrollbar-color:rgba(255,255,255,0.25) transparent;scrollbar-width:thin">
        <div id="rpt-content-area" class="max-w-4xl mx-auto w-full">
          <div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">No report generated yet. Click "Regenerate Report" to generate.</div>
        </div>
      </div>

      <!-- Right settings panel -->
      <div style="width:300px;min-width:300px;border-left:1px solid rgba(61,61,61,1);display:flex;flex-direction:column;overflow-y:auto;scrollbar-color:rgba(255,255,255,0.25) transparent;scrollbar-width:thin">

        <!-- Settings header -->
        <div style="padding:16px 20px 12px;border-bottom:1px solid rgba(61,61,61,1)">
          <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(122,122,122,1)">Report Settings</div>
        </div>

        <div style="padding:20px;display:flex;flex-direction:column;gap:20px;flex:1">

          <!-- Report Name -->
          <div style="display:flex;flex-direction:column;gap:6px">
            <label style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(122,122,122,1)">Report Name</label>
            <input id="rpt-sp-name" type="text"
              style="background:rgba(41,40,39,1);border:1px solid rgba(61,61,61,1);border-radius:8px;color:#fff;font-family:Figtree;font-size:14px;padding:8px 12px;width:100%;outline:none;transition:border-color .2s"
              onfocus="this.style.borderColor='rgba(204,195,149,0.6)'" onblur="this.style.borderColor='rgba(61,61,61,1)'" />
          </div>

          <!-- Date Range -->
          <div style="display:flex;flex-direction:column;gap:6px">
            <label style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(122,122,122,1)">Date Range</label>
            <div style="position:relative">
              <select id="rpt-sp-range"
                style="background:rgba(41,40,39,1);border:1px solid rgba(61,61,61,1);border-radius:8px;color:#fff;font-family:Figtree;font-size:14px;padding:8px 12px;width:100%;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none"
                onfocus="this.style.borderColor='rgba(204,195,149,0.6)'" onblur="this.style.borderColor='rgba(61,61,61,1)'">
                <option value="last_7_days" style="background:#1a1a1a">Last 7 days</option>
                <option value="last_30_days" style="background:#1a1a1a">Last 30 days</option>
                <option value="last_90_days" style="background:#1a1a1a">Last 90 days</option>
                <option value="this_month" style="background:#1a1a1a">This Month</option>
                <option value="last_month" style="background:#1a1a1a">Last Month</option>
                <option value="this_year" style="background:#1a1a1a">This Year</option>
                <option value="all_time" style="background:#1a1a1a">All Time</option>
              </select>
              <div style="position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;display:flex;align-items:center">
                <img src="/static/img/chevron-down-small.svg" style="width:12px;height:12px" alt="" />
              </div>
            </div>
          </div>

          <!-- Custom Prompt -->
          <div style="display:flex;flex-direction:column;gap:6px">
            <label style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(122,122,122,1)">Prompt</label>
            <textarea id="rpt-sp-prompt" rows="5" placeholder="Describe what you want this report to show…"
              style="background:rgba(41,40,39,1);border:1px solid rgba(61,61,61,1);border-radius:8px;color:#fff;font-family:Figtree;font-size:13px;line-height:1.5;padding:8px 12px;width:100%;outline:none;resize:vertical;transition:border-color .2s"
              onfocus="this.style.borderColor='rgba(204,195,149,0.6)'" onblur="this.style.borderColor='rgba(61,61,61,1)'"></textarea>
          </div>

          <!-- Regenerate button -->
          <button type="button" onclick="rptSaveAndRegenerate()"
            style="display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 16px;background:rgba(204,195,149,0.15);border:1px solid rgba(204,195,149,0.35);border-radius:10px;color:rgba(204,195,149,1);font-family:Figtree;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s,border-color .2s;width:100%"
            onmouseover="this.style.background='rgba(204,195,149,0.25)';this.style.borderColor='rgba(204,195,149,0.6)'"
            onmouseout="this.style.background='rgba(204,195,149,0.15)';this.style.borderColor='rgba(204,195,149,0.35)'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Regenerate Report
          </button>

          <!-- Save metadata only -->
          <button type="button" onclick="rptSaveMeta()"
            style="display:flex;align-items:center;justify-content:center;padding:8px 16px;background:transparent;border:1px solid rgba(61,61,61,1);border-radius:10px;color:rgba(122,122,122,1);font-family:Figtree;font-size:13px;cursor:pointer;transition:background .2s,border-color .2s,color .2s;width:100%"
            onmouseover="this.style.background='rgba(61,61,61,0.5)';this.style.color='#fff'"
            onmouseout="this.style.background='transparent';this.style.color='rgba(122,122,122,1)'">
            Save Changes
          </button>

        </div>

        <!-- Footer: last run -->
        <div style="padding:14px 20px;border-top:1px solid rgba(61,61,61,1)">
          <div style="font-size:11px;color:rgba(82,82,82,1)">Last run: <span id="rpt-detail-lastrun" style="color:rgba(122,122,122,1)">—</span></div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Panel: New Report Form ─────────────────────────────── -->
  <div id="rpt-panel-form" class="classes-view" style="display:none">
    <header class="panel-header">
      <h2 class="panel-title">New Report</h2>
    </header>

    <div class="panel-body flex flex-col gap-[30px] p-[20px] bg-[var(--colors-bg-moderate)] rounded-[20px] border border-[var(--colors-border-moderate)]">
      
      <!-- Details Section -->
      <div class="form-section">
        <h3 class="typography-body-lg font-bold text-[var(--colors-text-strong)]">Details</h3>
        <div class="flex flex-col gap-4 w-full">
          <div class="form-field">
            <label class="field-label">Report Name</label>
            <div class="form-input focus-within:border-[var(--colors-primary-default)] transition-all flex items-center">
              <input id="rpt-f-name" type="text" placeholder="e.g. Monthly Revenue Summary" class="bg-transparent border-none text-white w-full outline-none" />
            </div>
          </div>
        </div>
      </div>

      <!-- Instructions Section -->
      <div class="form-section">
        <div class="flex flex-col md:flex-row md:items-center justify-between w-full gap-4">
          <h3 class="typography-body-lg font-bold text-[var(--colors-text-strong)] m-0">Instructions</h3>
          <div class="flex gap-2 flex-wrap items-center">
            <span class="text-xs text-[var(--colors-text-moderate)] font-bold uppercase tracking-wider mr-1">Quick Start:</span>
            <button type="button" class="panel-btn panel-btn--outline text-xs px-3 py-1.5 h-auto" onclick="rptApplyQuickStart('financial')">Financial</button>
            <button type="button" class="panel-btn panel-btn--outline text-xs px-3 py-1.5 h-auto" onclick="rptApplyQuickStart('membership')">Members</button>
            <button type="button" class="panel-btn panel-btn--outline text-xs px-3 py-1.5 h-auto" onclick="rptApplyQuickStart('classes')">Classes</button>
            <button type="button" class="panel-btn panel-btn--outline text-xs px-3 py-1.5 h-auto" onclick="rptApplyQuickStart('staff')">Staff</button>
            <button type="button" class="panel-btn panel-btn--outline text-xs px-3 py-1.5 h-auto border-[var(--colors-primary-default)] text-[var(--colors-primary-default)]" onclick="rptApplyQuickStart('multi')">★ All-in-One</button>
          </div>
        </div>
        <div class="flex flex-col gap-4 w-full">
          <div class="form-field">
            <label class="field-label">Describe what you want this report to show</label>
            <div class="form-input focus-within:border-[var(--colors-primary-default)] transition-all flex flex-col items-start gap-2 p-4 h-auto min-h-[120px]">
              <textarea id="rpt-f-prompt" placeholder="e.g. Summarize our main revenue streams, show a breakdown of product orders, and include a donut chart for members vs bookings revenue." class="bg-transparent border-none text-white w-full outline-none resize-y min-h-[80px]" rows="4"></textarea>
            </div>
          </div>
        </div>
      </div>

      <!-- Date Range Section -->
      <div class="form-section">
        <h3 class="typography-body-lg font-bold text-[var(--colors-text-strong)]">Date Range</h3>
        <div class="flex flex-col gap-4 w-full">
          <div class="form-field">
            <label class="field-label">Range</label>
            <div class="relative w-full">
              <div class="form-input form-input--select focus-within:border-[var(--colors-primary-default)] transition-all flex items-center pr-10">
                <select id="rpt-f-range" class="bg-transparent border-none text-white w-full outline-none appearance-none cursor-pointer">
                  <option value="last_7_days" style="background:#1a1a1a">Last 7 days</option>
                  <option value="last_30_days" style="background:#1a1a1a" selected>Last 30 days</option>
                  <option value="last_90_days" style="background:#1a1a1a">Last 90 days</option>
                  <option value="this_month" style="background:#1a1a1a">This Month</option>
                  <option value="last_month" style="background:#1a1a1a">Last Month</option>
                  <option value="this_year" style="background:#1a1a1a">This Year</option>
                  <option value="all_time" style="background:#1a1a1a">All Time</option>
                </select>
              </div>
              <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none flex items-center">
                <img class="field-icon w-3 h-3" src="/static/img/chevron-down-small.svg" alt="" />
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Error message container -->
      <div id="rpt-form-error" style="color:#e05252;font-size:13px;display:none;padding:0 20px"></div>

      <!-- Action buttons -->
      <div class="flex justify-end gap-4 mt-6">
        <button type="button" class="panel-btn panel-btn--outline w-auto px-6 h-[48px]" onclick="rptCancelForm()">Cancel</button>
        <button type="button" class="panel-btn w-auto px-6 h-[48px]" onclick="rptSubmitForm()">Generate Report</button>
      </div>

    </div>
  </div>

</div>

<script>
(function () {
  var _detailReport = null;

  // ── Panel navigation ────────────────────────────────────────
  function show(id) {
    ["rpt-panel-list", "rpt-panel-detail", "rpt-panel-form"].forEach(function (p) {
      document.getElementById(p).style.display = p === id ? "" : "none";
    });
  }

  window.rptShowList = function () {
    loadReports();
    show("rpt-panel-list");
  };

  // ── List: load & render ─────────────────────────────────────
  function loadReports() {
    fetch("/api/reports")
      .then(function (r) { return r.json(); })
      .then(renderTable)
      .catch(function () {
        document.getElementById("rpt-tbody").innerHTML =
          '<tr><td colspan="4" class="data-table__cell" style="text-align:center;color:#e05252">Failed to load reports.</td></tr>';
      });
  }

  function renderTable(reports) {
    var tbody = document.getElementById("rpt-tbody");
    if (!reports.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="data-table__cell" style="text-align:center;color:rgba(122,122,122,1)">No reports yet. Create one above.</td></tr>';
      return;
    }
    tbody.innerHTML = reports.map(function (r) {
      var range = r.start && r.end ? r.start + " – " + r.end : r.start || r.end || "—";
      return '<tr class="data-table__row" style="cursor:pointer" onclick="rptShowDetail(\'' + r.id + '\')">'
        + '<td class="data-table__cell">' + esc(r.name) + '</td>'
        + '<td class="data-table__cell">' + esc(range) + '</td>'
        + '<td class="data-table__cell">' + esc(r.last_run) + '</td>'
        + '<td class="data-table__cell data-table__cell--actions">'
        +   '<button type="button" class="data-table__menu-btn" onclick="event.stopPropagation()" aria-label="Options">'
        +     '<span class="data-table__ellipsis">⋮</span>'
        +   '</button>'
        + '</td>'
        + '</tr>';
    }).join("");
  }

  // ── Detail ──────────────────────────────────────────────────
  function populateDetailPanel(r) {
    _detailReport = r;
    document.getElementById("rpt-detail-title").textContent = r.name;
    document.getElementById("rpt-detail-lastrun").textContent = r.last_run || "—";
    // Populate side panel fields
    document.getElementById("rpt-sp-name").value   = r.name  || "";
    document.getElementById("rpt-sp-range").value  = r.date_range || "last_30_days";
    document.getElementById("rpt-sp-prompt").value = r.prompt || "";
  }

  function loadDetailContent(id) {
    var area = document.getElementById("rpt-content-area");
    area.innerHTML = '<div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">Loading…</div>';
    fetch("/api/reports/" + id + "/content")
      .then(function (r) { return r.json(); })
      .then(function (content) {
        var sections = content.sections || [];
        if (!sections.length) {
          area.innerHTML = '<div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">No report generated yet. Click "Regenerate Report" to generate.</div>';
        } else {
          renderReportSections(sections);
        }
      })
      .catch(function () {
        area.innerHTML = '<div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">No report generated yet. Click "Regenerate Report" to generate.</div>';
      });
  }

  window.rptShowDetail = function (id) {
    fetch("/api/reports")
      .then(function (r) { return r.json(); })
      .then(function (reports) {
        var r = reports.find(function (x) { return x.id === id; });
        if (!r) return;
        populateDetailPanel(r);
        show("rpt-panel-detail");
        loadDetailContent(id);
      });
  };

  window.rptDelete = function () {
    if (!_detailReport) return;
    if (!confirm('Delete "' + _detailReport.name + '"?')) return;
    fetch("/api/reports/" + _detailReport.id, { method: "DELETE" })
      .then(function () { window.rptShowList(); });
  };

  // ── Save metadata (side panel fields) ──────────────────────
  function collectSidePanelPayload() {
    return {
      name:       document.getElementById("rpt-sp-name").value.trim()   || _detailReport.name,
      type:       _detailReport.type,
      date_range: document.getElementById("rpt-sp-range").value,
      prompt:     document.getElementById("rpt-sp-prompt").value.trim(),
    };
  }

  window.rptSaveMeta = function () {
    if (!_detailReport) return;
    var payload = collectSidePanelPayload();
    fetch("/api/reports/" + _detailReport.id, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    })
      .then(function (r) { if (!r.ok) throw new Error(); return r.json(); })
      .then(function (saved) {
        _detailReport = saved;
        document.getElementById("rpt-detail-title").textContent = saved.name;
      })
      .catch(function () { alert("Failed to save changes."); });
  };

  // ── Save + regenerate ───────────────────────────────────────
  window.rptSaveAndRegenerate = function () {
    if (!_detailReport) return;
    var payload = collectSidePanelPayload();
    var area = document.getElementById("rpt-content-area");
    area.innerHTML = '<div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">Saving…</div>';

    fetch("/api/reports/" + _detailReport.id, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    })
      .then(function (r) { if (!r.ok) throw new Error(); return r.json(); })
      .then(function (saved) {
        _detailReport = saved;
        document.getElementById("rpt-detail-title").textContent = saved.name;
        area.innerHTML = '<div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">Generating report…</div>';
        return fetch("/api/reports/" + saved.id + "/generate", { method: "POST" });
      })
      .then(function (r) { if (!r.ok) throw new Error("Server error"); return r.json(); })
      .then(function (content) {
        if (content.generated_at) {
          document.getElementById("rpt-detail-lastrun").textContent = content.generated_at;
          _detailReport.last_run = content.generated_at;
        }
        renderReportSections(content.sections || []);
      })
      .catch(function () {
        area.innerHTML = '<div style="color:#e05252;font-size:14px;text-align:center;padding:48px 0">Failed to generate report. Please try again.</div>';
      });
  };

  // ── Section renderer ────────────────────────────────────────
  function renderReportSections(sections) {
    var area = document.getElementById("rpt-content-area");
    if (!sections.length) {
      area.innerHTML = '<div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">No sections generated.</div>';
      return;
    }

    var html = "";
    var chartQueue = [];

    function renderError(title, message) {
      var out = '<div style="margin-bottom:28px">';
      if (title) out += '<h3 style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:rgba(122,122,122,1);margin-bottom:8px">' + esc(title) + '</h3>';
      out += '<div style="font-size:13px;color:#e0a052;background:rgba(224,160,82,0.08);border:1px solid rgba(224,160,82,0.3);border-radius:8px;padding:12px">' + esc(message) + '</div>';
      out += '</div>';
      return out;
    }

    function renderSectionHeader(title) {
      if (!title) return '';
      return '<h3 style="font-size:14px;font-weight:600;letter-spacing:.02em;color:#fff;margin-bottom:12px">' + esc(title) + '</h3>';
    }

    function renderRichContent(content) {
      if (!content) return '';
      if (!window.marked || !window.DOMPurify) {
        return '<div class="rpt-md"><p>' + esc(content) + '</p></div>';
      }
      var normalized = content.replace(/(?:^|\s)(\d+\.\s)/g, '\n$1').replace(/^\n+/, '');
      marked.setOptions({ breaks: true, gfm: true });
      var html = marked.parse(normalized);
      return '<div class="rpt-md">' + DOMPurify.sanitize(html) + '</div>';
    }

    function renderSectionContent(content) {
      return renderRichContent(content);
    }

    sections.forEach(function (sec, i) {
      if (sec.error && sec.type !== "text") {
        html += renderError(sec.title, sec.error);
        return;
      }

      if (sec.type === "text") {
        html += '<div style="margin-bottom:32px">';
        html += renderSectionHeader(sec.title);
        html += renderRichContent(sec.content || "");
        html += '</div>';

      } else if (sec.type === "table") {
        html += '<div style="margin-bottom:32px">';
        html += renderSectionHeader(sec.title);
        html += renderSectionContent(sec.content);
        html += '<table style="width:100%;border-collapse:collapse">';
        if (sec.columns && sec.columns.length) {
          html += '<thead><tr>';
          sec.columns.forEach(function (col) {
            html += '<th style="text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:rgba(122,122,122,1);border-bottom:1px solid rgba(61,61,61,1)">' + esc(col) + '</th>';
          });
          html += '</tr></thead>';
        }
        html += '<tbody>';
        (sec.rows || []).forEach(function (row) {
          html += '<tr class="data-table__row">';
          row.forEach(function (cell) {
            html += '<td style="padding:10px 12px;font-size:13px;color:#fff;border-bottom:1px solid rgba(61,61,61,0.5)">' + esc(String(cell == null ? "" : cell)) + '</td>';
          });
          html += '</tr>';
        });
        html += '</tbody></table>';
        html += '</div>';

      } else if (sec.type === "chart") {
        var chartId = "rpt-chart-" + i;
        html += '<div style="margin-bottom:32px">';
        html += renderSectionHeader(sec.title);
        html += renderSectionContent(sec.content);
        html += '<div id="' + chartId + '" style="height:240px;width:100%"></div>';
        html += '</div>';
        if (sec.spec) chartQueue.push({ id: chartId, spec: sec.spec });
      }
    });

    area.innerHTML = html;

    chartQueue.forEach(function (c) {
      var el = document.getElementById(c.id);
      if (el && window.Plotly) {
        Plotly.newPlot(el, c.spec.data, c.spec.layout, { responsive: true, displayModeBar: false });
      }
    });
  }

  // ── Form: new report ────────────────────────────────────────
  window.rptShowNew = function () {
    clearForm();
    show("rpt-panel-form");
  };

  window.rptCancelForm = function () {
    window.rptShowList();
  };

  window.rptApplyQuickStart = function (key) {
    var promptEl = document.getElementById("rpt-f-prompt");
    var nameEl = document.getElementById("rpt-f-name");
    
    var prompts = {
      financial: "Give me a detailed financial report showing total realized revenue, a breakdown of revenue by source (membership, product, booking) as a donut chart, and a line chart of daily revenue trends.",
      membership: "Give me a membership report showing total memberships, a distribution of memberships by plan type, and a table of customers with active plans.",
      classes: "Give me a class attendance and visit report. Show a bar chart of class attendance (visits) grouped by class name for confirmed check-ins, and a list of the most popular classes.",
      staff: "Give me a staff performance report showing the total classes taught by each instructor (confirmed check-ins), and a table of revenue generated by instructor bookings.",
      multi: "Give me a report on my revenue, my visit count, and my membership count. Include a narrative summary first, a line chart of daily revenue, a bar chart of daily class attendance visits, and a donut chart of membership plan distribution."
    };
    
    var names = {
      financial: "Financial & Revenue Summary",
      membership: "Membership Distribution Analysis",
      classes: "Class Attendance & Visits Report",
      staff: "Staff Performance & Booking Revenue",
      multi: "Studio Performance Overview (All-in-One)"
    };
    
    if (prompts[key]) {
      promptEl.value = prompts[key];
    }
    if (names[key]) {
      nameEl.value = names[key];
    }
  };

  window.rptSubmitForm = function () {
    var name   = document.getElementById("rpt-f-name").value.trim();
    var prompt = document.getElementById("rpt-f-prompt").value.trim();
    var range  = document.getElementById("rpt-f-range").value;
    var errEl  = document.getElementById("rpt-form-error");

    if (!name) {
      errEl.textContent = "Report name is required.";
      errEl.style.display = "";
      return;
    }
    errEl.style.display = "none";

    fetch("/api/reports", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, type: "", prompt: prompt, date_range: range }),
    })
      .then(function (r) { if (!r.ok) throw new Error("Server error"); return r.json(); })
      .then(function (saved) {
        populateDetailPanel(saved);
        show("rpt-panel-detail");
        // Auto-generate on create
        var area = document.getElementById("rpt-content-area");
        area.innerHTML = '<div style="color:rgba(122,122,122,1);font-size:14px;text-align:center;padding:48px 0">Generating report…</div>';
        return fetch("/api/reports/" + saved.id + "/generate", { method: "POST" });
      })
      .then(function (r) { if (!r.ok) throw new Error(); return r.json(); })
      .then(function (content) {
        if (content.generated_at) {
          document.getElementById("rpt-detail-lastrun").textContent = content.generated_at;
        }
        renderReportSections(content.sections || []);
      })
      .catch(function () {
        document.getElementById("rpt-form-error").textContent = "Something went wrong. Please try again.";
        document.getElementById("rpt-form-error").style.display = "";
      });
  };

  // ── Helpers ─────────────────────────────────────────────────
  function clearForm() {
    document.getElementById("rpt-f-name").value = "";
    document.getElementById("rpt-f-range").value = "last_30_days";
    document.getElementById("rpt-f-prompt").value = "";
    document.getElementById("rpt-form-error").style.display = "none";
  }

  function esc(s) {
    return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // Boot
  loadReports();
})();
</script>
