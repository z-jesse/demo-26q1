<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Vygor - Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Figtree', 'sans-serif'],
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-[#1a1a1e] text-[#e4e4e7] flex items-center justify-center h-screen font-sans antialiased">
    <div class="w-full max-w-[320px] p-8">
      <h1 class="text-2xl font-bold mb-6 text-center text-white">Vygor</h1>
      <form class="flex flex-col gap-4" method="post" action="{{ url_for('login') }}">
        <input 
          class="w-full px-4 py-3 text-base font-sans border border-[#3f3f46] rounded-lg bg-[#27272a] text-[#e4e4e7] placeholder-[#71717a] focus:outline-none focus:border-[#4a90e2] transition-colors" 
          type="password" 
          name="password" 
          placeholder="Password" 
          required 
          autofocus 
          autocomplete="current-password" 
        />
        <button 
          class="px-4 py-3 text-base font-bold rounded-lg bg-[#4a90e2] hover:bg-[#3b7bc9] text-white cursor-pointer transition-colors border-none" 
          type="submit"
        >
          Sign in
        </button>
        {% if error %}
        <p class="text-[#f87171] text-[0.875rem] m-0">{{ error }}</p>
        {% endif %}
      </form>
    </div>
  </body>
</html>
