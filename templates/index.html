<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Vygor - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='globals.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styleguide.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist-min@3.3.1/plotly.min.js"></script>
  </head>
  <body>
    <div class="base" data-colors-mode="dark">
      <aside class="frame" role="navigation" aria-label="Main navigation">
        <div class="div-wrapper">
          <h1 class="text-wrapper">Vygor</h1>
        </div>
        <nav class="div">
          <button class="frame-2" data-colors-mode="dark" aria-label="Chat">
            <img class="img" src="/static/img/sparkles-two-ai-2-stars-sparkles.svg" alt="" aria-hidden="true" />
            <span class="text-wrapper-2">Chat</span>
          </button>
          <ul class="frame-3" data-colors-mode="dark">
            <li>
              <a href="/" class="frame-4" data-colors-mode="dark">
                <img class="img" src="/static/img/home-roof-house.svg" alt="" aria-hidden="true" />
                <span class="text-wrapper-3">Dashboard</span>
              </a>
            </li>
            <li>
              <a href="#checkin" class="frame-4" data-colors-mode="dark">
                <img class="img" src="/static/img/clipboard-2-copy-list.svg" alt="" aria-hidden="true" />
                <span class="text-wrapper-3">Check In</span>
              </a>
            </li>
            <li>
              <a href="#pos" class="frame-4" data-colors-mode="dark">
                <img class="img" src="/static/img/store-shop-business.svg" alt="" aria-hidden="true" />
                <span class="text-wrapper-3">Point of Sale</span>
              </a>
            </li>
            <li>
              <a href="#schedule" class="frame-4" data-colors-mode="dark">
                <img class="img" src="/static/img/calendar-3-date.svg" alt="" aria-hidden="true" />
                <span class="text-wrapper-3">Schedule</span>
              </a>
            </li>
            <li>
              <a href="/?center=classes" class="frame-4" data-colors-mode="dark">
                <img class="img" src="/static/img/people-2-user-avatar-group.svg" alt="" aria-hidden="true" />
                <span class="text-wrapper-3">Classes</span>
              </a>
            </li>
            <li>
              <a href="#memberships" class="frame-4" data-colors-mode="dark">
                <img class="img" src="/static/img/crown-vip.svg" alt="" aria-hidden="true" />
                <span class="text-wrapper-3">Memberships</span>
              </a>
            </li>
            <li>
              <a href="#customers" class="frame-4" data-colors-mode="dark">
                <img class="img" src="/static/img/people-user-person-avatar.svg" alt="" aria-hidden="true" />
                <span class="text-wrapper-3">Customers</span>
              </a>
            </li>
            <li>
              <a href="#communications" class="frame-4" data-colors-mode="dark">
                <img class="img" src="/static/img/bubble-2-message.svg" alt="" aria-hidden="true" />
                <span class="text-wrapper-3">Communications</span>
              </a>
            </li>
            <li>
              <a href="/?center=analytics" class="frame-4" data-colors-mode="dark">
                <img class="img" src="/static/img/chart-5-statistics-graph.svg" alt="" aria-hidden="true" />
                <span class="text-wrapper-3">Analytics</span>
              </a>
            </li>
            <li>
              <a href="#team" class="frame-4" data-colors-mode="dark">
                <img class="img" src="/static/img/postcard-card-news.svg" alt="" aria-hidden="true" />
                <span class="text-wrapper-3">Team</span>
              </a>
            </li>
            <li>
              <a href="#settings" class="frame-4" data-colors-mode="dark">
                <img class="img" src="/static/img/settings-gear-2-preferences.svg" alt="" aria-hidden="true" />
                <span class="text-wrapper-3">Settings</span>
              </a>
            </li>
          </ul>
        </nav>
        <div class="frame-wrapper">
          <div class="frame-5" data-colors-mode="dark">
            <img class="frame-6" src="/static/img/panther.jpg" alt="Vygor Test logo" />
            <div class="frame-7">
              <div class="text-wrapper-4">Vygor Test</div>
              <div class="text-wrapper-5">Yoga Studio</div>
            </div>
          </div>
        </div>
      </aside>
      <main class="frame-8">
        <header class="frame-9">
          <div class="search-field" data-colors-mode="dark">
            <form class="field" role="search" aria-label="Search">
              <img class="img" src="/static/img/magnifying-glass-search.svg" alt="" aria-hidden="true" />
              <label for="search-input" class="visually-hidden">Search</label>
              <input id="search-input" class="search" placeholder="Search" type="search" name="search" />
            </form>
          </div>
          <div class="frame-10">
            <button class="frame-11" data-colors-mode="dark" aria-label="Point of Sale">
              <img class="img-2" src="/static/img/store-shop-business-yellow.svg" alt="" aria-hidden="true" />
              <span class="text-wrapper-6">PoS</span>
            </button>
            <button class="frame-11" data-colors-mode="dark" aria-label="Check In">
              <img class="img-2" src="/static/img/clipboard-2-copy-list-yellow.svg" alt="" aria-hidden="true" />
              <span class="text-wrapper-6">Check In</span>
            </button>
            <button class="frame-12" aria-label="User menu">
              <img class="ellipse" src="/static/img/brandon.jpg" alt="Test User avatar" />
              <span class="text-wrapper-3">Brandon Wang</span>
              <img class="img-3" src="/static/img/chevron-down-small.svg" alt="" aria-hidden="true" />
            </button>
          </div>
        </header>
        <div class="frame-13" data-colors-mode="dark">
          <div class="frame-14">
            {% include (center_template or "center/dashboard.html") %}
          </div>
          <aside class="frame-23" aria-label="AI Assistant">
            <div class="frame-24" aria-live="polite">
              <div id="chat-log"></div>
            </div>
            <div class="frame-25">
              <form id="assistant-form" method="post" action="{{ url_for('home', center=center_key) }}">
                <textarea
                  id="prompt-input"
                  name="prompt"
                  class="p"
                  placeholder="How can Vygor Intelligence help?"
                  autocomplete="off"
                  rows="3"
                >{{ user_prompt or "" }}</textarea>
              </form>
            </div>
          </aside>
        </div>
      </main>
    </div>

    <script>
      (function () {
        const form = document.getElementById("assistant-form");
        const textarea = document.getElementById("prompt-input");
        const chatLog = document.getElementById("chat-log");
        if (!form || !textarea || !chatLog) return;

        const STORAGE_KEY = "vygor-chat-history-v2";
        // [{role: "user"|"assistant", html: "...", text: "..."}]
        let chatHistory = [];

        // ── Restore ──────────────────────────────────────────────────────────
        try {
          const saved = sessionStorage.getItem(STORAGE_KEY);
          if (saved) { chatHistory = JSON.parse(saved); renderAll(); }
        } catch (_) {}

        function escapeHtml(s) {
          return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function scrollToBottom() {
          const scroller = chatLog.parentElement;
          if (scroller) scroller.scrollTop = scroller.scrollHeight;
        }

        function addBubble(role) {
          const row = document.createElement("div");
          row.className = "chat-msg chat-msg-" + (role === "user" ? "user" : "ai");
          const bubble = document.createElement("div");
          bubble.className = "chat-bubble";
          row.appendChild(bubble);
          chatLog.appendChild(row);
          scrollToBottom();
          return bubble;
        }

        function renderChart(el) {
          try {
            const spec = JSON.parse(el.getAttribute("data-chart-spec"));
            if (typeof Plotly !== "undefined") {
              Plotly.newPlot(el, spec.data, spec.layout, { responsive: true, displayModeBar: false });
            }
          } catch (_) {}
        }

        function renderAll() {
          chatLog.innerHTML = "";
          chatHistory.forEach(function (msg) {
            const bubble = addBubble(msg.role);
            bubble.innerHTML = msg.html;
          });
          chatLog.querySelectorAll(".assistant-chart[data-chart-spec]").forEach(renderChart);
          scrollToBottom();
        }

        function persist() {
          try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory)); } catch (_) {}
        }

        let currentController = null;

        async function submitPrompt() {
          const prompt = (textarea.value || "").trim();
          if (!prompt) return;

          if (prompt === "/clear") {
            textarea.value = "";
            chatHistory = [];
            chatLog.innerHTML = "";
            persist();
            return;
          }

          if (currentController) { currentController.abort(); currentController = null; }

          textarea.disabled = true;
          textarea.value = "";

          // User bubble
          const userHtml = escapeHtml(prompt);
          chatHistory.push({ role: "user", html: userHtml, text: prompt });
          const userBubble = addBubble("user");
          userBubble.innerHTML = userHtml;
          persist();

          // AI bubble — thinking state
          const aiBubble = addBubble("assistant");
          aiBubble.innerHTML = '<span class="thinking">Thinking\u2026</span>';

          // History for API: all turns before this new user message
          const apiHistory = chatHistory.slice(0, -1).map(function (m) {
            return { role: m.role, content: m.text || "" };
          });

          const controller = new AbortController();
          currentController = controller;

          try {
            const resp = await fetch("/api/stream", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              signal: controller.signal,
              body: JSON.stringify({ prompt: prompt, history: apiHistory })
            });

            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buf = "";
            let firstReal = true;
            let streamHtml = "";

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              buf += decoder.decode(value, { stream: true });

              // SSE events are delimited by \n\n
              let boundary;
              while ((boundary = buf.indexOf("\n\n")) !== -1) {
                const rawEvent = buf.slice(0, boundary);
                buf = buf.slice(boundary + 2);

                for (const line of rawEvent.split("\n")) {
                  if (!line.startsWith("data: ")) continue;
                  const msg = line.slice(6);

                  if (msg.startsWith("__REDIRECT__")) {
                    // Commit AI response to history before navigating away
                    const tmp = document.createElement("div");
                    tmp.innerHTML = aiBubble.innerHTML;
                    chatHistory.push({ role: "assistant", html: aiBubble.innerHTML, text: tmp.textContent || "" });
                    persist();
                    const payload = msg.slice("__REDIRECT__".length);
                    const url = new URL(window.location.href);
                    if (payload.includes("=")) {
                      payload.split("&").forEach(function (pair) {
                        const eq = pair.indexOf("=");
                        if (eq > 0) url.searchParams.set(pair.slice(0, eq), pair.slice(eq + 1));
                      });
                    } else {
                      url.searchParams.set("center", payload);
                    }
                    window.location.href = url.toString();
                    return;
                  }

                  if (msg.startsWith("__EMAIL__")) {
                    try {
                      sessionStorage.setItem("vygor-draft-email", msg.slice("__EMAIL__".length));
                    } catch (_) {}
                  } else if (msg.startsWith("__CLASS__")) {
                    try {
                      sessionStorage.setItem("vygor-new-class", msg.slice("__CLASS__".length));
                    } catch (_) {}
                  } else if (msg.startsWith("__CHART__")) {
                    try {
                      const spec = JSON.parse(msg.slice("__CHART__".length));
                      const chartId = "chat-chart-" + Date.now();
                      const chartDiv = document.createElement("div");
                      chartDiv.id = chartId;
                      chartDiv.className = "assistant-chart";
                      chartDiv.setAttribute("data-chart-spec", JSON.stringify(spec));
                      if (firstReal) { aiBubble.innerHTML = ""; firstReal = false; }
                      aiBubble.appendChild(chartDiv);
                      renderChart(chartDiv);
                    } catch (_) {}
                  } else {
                    if (firstReal) { streamHtml = ""; aiBubble.innerHTML = ""; firstReal = false; }
                    streamHtml += msg;
                    aiBubble.innerHTML = streamHtml;
                  }
                  scrollToBottom();
                }
              }
            }
          } catch (e) {
            if (e.name !== "AbortError") {
              streamHtml = '<span style="color:#dc2626">Connection error — please try again.</span>';
              aiBubble.innerHTML = streamHtml;
            }
          }

          // Commit AI response to history
          const tmp = document.createElement("div");
          tmp.innerHTML = aiBubble.innerHTML;
          chatHistory.push({ role: "assistant", html: aiBubble.innerHTML, text: tmp.textContent || "" });
          persist();

          currentController = null;
          textarea.disabled = false;
          textarea.focus();
        }

        form.addEventListener("submit", function (e) { e.preventDefault(); submitPrompt(); });
        textarea.addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submitPrompt(); }
        });
      })();

      // Fill new-class form with AI-inferred details on redirect
      (function () {
        const params = new URLSearchParams(window.location.search);
        if (params.get("center") !== "new_class") return;
        var raw;
        try { raw = sessionStorage.getItem("vygor-new-class"); } catch (_) { return; }
        if (!raw) return;
        var data;
        try { data = JSON.parse(raw); sessionStorage.removeItem("vygor-new-class"); } catch (_) { return; }
        function fill(id, val) {
          var el = document.getElementById(id);
          if (el && val != null && val !== "") el.textContent = val;
        }
        fill("nc-name", data.name);
        fill("nc-date", data.date);
        fill("nc-time", data.time);
        fill("nc-duration", data.duration_minutes != null ? data.duration_minutes + " minutes" : null);
        fill("nc-max", data.max_participants);
        fill("nc-price", data.price != null ? data.price : null);

        // Intercept "Add New Class" — save current field values before navigating to class list
        var addBtn = document.querySelector(".button-3");
        if (addBtn) {
          addBtn.addEventListener("click", function (e) {
            e.preventDefault();
            var name = (document.getElementById("nc-name") || {}).textContent || "";
            var date = (document.getElementById("nc-date") || {}).textContent || "";
            var time = (document.getElementById("nc-time") || {}).textContent || "";
            try {
              sessionStorage.setItem("vygor-created-class", JSON.stringify({ name: name, date: date, time: time }));
            } catch (_) {}
            window.location.href = "/?center=classes&new=1";
          });
        }
      })();

      // Fill new class row in class list with details saved from the form
      (function () {
        const params = new URLSearchParams(window.location.search);
        if (params.get("center") !== "classes") return;
        var raw;
        try { raw = sessionStorage.getItem("vygor-created-class"); } catch (_) { return; }
        if (!raw) return;
        var data;
        try { data = JSON.parse(raw); } catch (_) { return; }
        if (data.name) {
          var el = document.getElementById("cl-name");
          if (el) el.textContent = data.name;
        }
        if (data.date || data.time) {
          var el = document.getElementById("cl-date");
          if (el) el.textContent = (data.date || "") + (data.time ? " @ " + data.time : "");
        }
      })();
    </script>
  </body>
</html>
